<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup - FoodShare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2 id="auth-title">Login to FoodShare</h2>
        
        <form id="auth-form">
            <div class="form-group" id="name-group" class="hidden">
                <label>Organization/Full Name</label>
                <input type="text" id="user-name" placeholder="Enter name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>

            <div class="form-group" id="role-group" class="hidden">
                <label>Register as</label>
                <select id="role">
                    <option value="donor">Donor</option>
                    <option value="ngo">NGO</option>
                </select>
            </div>

            <button type="submit" id="auth-btn">Login</button>
        </form>

        <p class="switch-auth" id="toggle-msg">
            Don't have an account? <span id="toggle-auth">Sign Up</span>
        </p>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>

<script type="module" src="auth.js"></script>
</body>
</html>
