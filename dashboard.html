
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Food Donation Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <h2>Food Donation Platform<span>.</span></h2>
        <div class="nav-controls">
            <!-- Wrapped in user-badge-wrapper for the new Premium Dark UI styling -->
            <div class="user-badge-wrapper"><span id="user-display">Loading...</span></div>
            <button id="logout-btn" class="btn-logout">Logout</button>
        </div>
    </header>

    <main class="dashboard-main">
        
        <!-- ================= DONOR WORKSPACE ================= -->
        <div id="donor-section" class="hidden">
            
            <!-- Donor Progress & Badges -->
            <div id="donor-badge-display"></div>

            <h3 class="section-header">Post a New Donation</h3>
            <div class="post-donation-card">
                <form id="donation-form">
                    <div class="form-row" style="display: flex; flex-wrap: wrap; gap: 15px;">
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label>Food Item</label>
                            <input type="text" id="food-type" placeholder="e.g., Rice & Curry" required>
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label>Quantity</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="number" id="quantity" placeholder="e.g., 10" required min="1" style="flex: 2;">
                                <select id="quantity-unit" style="flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px;">
                                    <option value="kg">kg</option>
                                    <option value="servings">Servings</option>
                                    <option value="packets">Packets</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <!-- NEW: Contact Number Field -->
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label>Donor Contact Number</label>
                            <input type="tel" id="contact-number" placeholder="e.g., 9876543210" required>
                        </div>
                    </div>
                    <div class="form-row" style="display: flex; flex-wrap: wrap; gap: 15px;">
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label>Safe to consume for (Hours)</label>
                            <input type="number" id="shelf-life" placeholder="e.g., 4" required min="1">
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label>Pickup Location (in Lucknow)</label>
                            <input type="text" id="address" placeholder="e.g., Gomti Nagar" required>
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label>Upload Food Photo</label>
                            <input type="file" id="food-photo" accept="image/*" required>
                            <!-- Image Preview Box -->
                            <img id="photo-preview" style="max-width: 100%; height: 150px; display: none; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 2px dashed #ccc;">
                        </div>
                    </div>
                    <button type="submit" style="margin-top: 0.5rem;">List Food Item</button>
                </form>
            </div>

            <h3 class="section-header">My Donation Tracking</h3>
            <div id="donor-history" class="dashboard-grid">
                <!-- Donor history will load here -->
            </div>
        </div>

        <!-- ================= NGO WORKSPACE ================= -->
        <div id="ngo-section" class="hidden">
            
            <!-- NGO Claim Tracking Area -->
            <h3 class="section-header" id="my-claims-header" style="display:none; color: var(--primary);">Active Pickups (Needs Completion)</h3>
            <div id="ngo-claims" class="dashboard-grid" style="margin-bottom: 30px;">
                <!-- Claimed items to be marked as completed will go here -->
            </div>

            <h3 class="section-header">Available Food in Lucknow</h3>
            
            <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
                <div style="flex: 2; min-width: 250px; position: relative;">
                    <span style="position: absolute; left: 12px; top: 12px; color: #888;">🔍</span>
                    <input type="text" id="search-food" placeholder="Search food or area (e.g., Rice, Gomti Nagar)..." style="width: 100%; padding: 10px 10px 10px 35px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px;">
                </div>
                
                <div style="flex: 1; min-width: 150px; position: relative;">
                    <span style="position: absolute; left: 12px; top: 12px; color: #888;">📍</span>
                    <select id="filter-location" style="width: 100%; padding: 10px 10px 10px 35px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; pointer-events: none; background-color: #f5f5f5;">
                        <option value="lucknow">Lucknow </option>
                    </select>
                </div>
            </div>

            <!-- The Google Map Container (Strictly for NGOs) -->
            <div id="map" style="width: 100%; height: 400px; border-radius: 8px; margin-bottom: 20px; background: #e5e5e5; display: flex; align-items: center; justify-content: center; color: #888;">
                Map will load here...
            </div>

            <div id="available-feed" class="dashboard-grid">
                <!-- NGO feed will load here -->
            </div>
        </div>

    </main>
    
    <!-- Container for Real-Time Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Google Maps API Script -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyChCPB5MXM8vK0MAlVtIGEZYsBwBWwkG1o"></script>

    <!-- Main Logic -->
    <script type="module" src="dashboard.js" defer></script>
</body>
</html>
