<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FoodShare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <h2>FoodShare</h2>
        <div class="nav-controls">
            <span class="user-badge" id="user-display">Loading...</span>
            <button id="logout-btn" class="btn-logout">Logout</button>
        </div>
    </header>

    <main class="dashboard-main">
        
        <div id="donor-section" class="hidden">
            <h3 class="section-header">Post a New Donation</h3>
            <div class="post-donation-card">
                <form id="donation-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Food Item</label>
                            <input type="text" id="food-type" placeholder="e.g., 50 Servings of Rice & Curry" required>
                        </div>
                        <div class="form-group">
                            <label>Quantity</label>
                            <input type="text" id="quantity" placeholder="e.g., 10 Kgs / 50 Packets" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Safe to consume for (Shelf Life)</label>
                            <input type="text" id="shelf-life" placeholder="e.g., Next 4 hours" required>
                        </div>
                        <div class="form-group">
                            <label>Pickup Location</label>
                            <input type="text" id="address" placeholder="Complete address for pickup" required>
                        </div>
                    </div>
                    <button type="submit" style="margin-top: 0.5rem;">List Food Item</button>
                </form>
            </div>

            <h3 class="section-header">My Donation History</h3>
            <div id="donor-history" class="dashboard-grid">
                </div>
        </div>

        <div id="ngo-section" class="hidden">
            <h3 class="section-header">Available Food in Your Area</h3>
            <div id="available-feed" class="dashboard-grid">
                </div>
        </div>

    </main>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
